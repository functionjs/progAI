<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crisis Management 💰</title>
  <link rel="stylesheet" href="gameStyleCopilot.css">
</head>
<body>
  <h1>Crisis Management 💰</h1>
  <h2>Author: YourFirstName YourLastName</h2>

  <p><strong>Legend:</strong> A financial crisis game where managers transfer coins to blockchain accounts. Strategy determines survival!</p>

  <!-- Player Inputs -->
  <label>Your Name: <input type="text" id="playerName"></label><br>
  <label>Partner Name: <input type="text" id="partnerName"></label><br><br>

  <!-- Accounts -->
  <label>Account A: <input type="number" id="accountA" value="5"></label><br>
  <label>Account B: <input type="number" id="accountB" value="7"></label><br>
  <label>Account C: <input type="number" id="accountC" value="9"></label><br><br>

  <!-- Buttons -->
  <button id="startGame">Start Game</button>
  <button id="makeTurn">Make Turn</button><br><br>

  <!-- Game State -->
  <div id="gameState"></div>
  <div id="winner"></div>

  <script src="jsCopilot.js"></script>
</body>
</html>
